<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
		<meta name="apple-mobile-web-app-capable" content="yes">
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
		<meta name="viewport" content="viewport-fit=cover, user-scalable=no, width=device-width, initial-scale=1, maximum-scale=1">
		<title>ANTI-GRAVITY — Race</title>
		<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cpath d='M4 40 L40 8 L60 12 L30 56 Z' fill='%231030ff'/%3E%3Cpath d='M4 40 L40 8 L44 24 Z' fill='%2300c8ff'/%3E%3C/svg%3E">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;700&family=Space+Mono&display=swap" rel="stylesheet">
		<style>
			html, body {
				color:#dfe6ff;
				font-family:'Chakra Petch', system-ui, sans-serif;
				background-color:#05070f;
				margin:0;
				overflow:hidden;
			}
			/* the canvas *must not* have any border or padding, or mouse coords will be wrong */
			canvas {
				border:0 none;
				background-color:#000;
				width:100%;
				height:100%;
				aspect-ratio:16 / 9;
				display:block;
			}
			.container{position:relative;width:100%;height:100vh;height:100dvh;display:flex;align-items:center;justify-content:center}

			/* ---- minimal in-game nav (replaces the old control-legend bar) ---- */
			#nav{
				position:fixed;top:0;left:0;right:0;z-index:20;
				display:flex;justify-content:space-between;align-items:center;
				padding:12px 16px;pointer-events:none;
				font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.12em;
				transition:opacity .4s ease;
			}
			#nav.hide{opacity:0}
			#nav a, #nav button{
				pointer-events:auto;cursor:pointer;text-decoration:none;
				font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.12em;
				color:#aeb9e8;background:rgba(10,16,40,.55);border:1px solid rgba(120,140,220,.35);
				padding:8px 13px;border-radius:6px;display:inline-flex;align-items:center;gap:8px;
				transition:background .15s ease,color .15s ease,border-color .15s ease;backdrop-filter:blur(4px);
			}
			#nav a:hover, #nav button:hover{color:#fff;background:rgba(18,48,255,.55);border-color:#1230ff}
			#nav .mark{display:flex;align-items:center;gap:9px;color:#fff;font-weight:700}
			#nav .mark svg{width:20px;height:20px}

			/* ---- loading overlay ---- */
			.info-overlay{
				text-align:center;position:absolute;inset:0;margin:auto;
				width:280px;height:160px;display:none;z-index:10;
			}
			.info-overlay#loading{display:block}
			#spinner{
				border-radius:50%;width:46px;height:46px;position:absolute;margin:auto;
				top:0;bottom:40px;left:0;right:0;
				border:2px solid rgba(120,140,220,.25);border-left-color:#00c8ff;border-top-color:#1230ff;
				animation:page-loader 1s infinite linear;
			}
			@keyframes page-loader{from{transform:rotate(0)}to{transform:rotate(360deg)}}
			#status{position:absolute;left:0;right:0;bottom:8px;font-family:'Space Mono',monospace;
				font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:#9fb0e8}
			#progress{position:absolute;left:50%;transform:translateX(-50%);bottom:-12px;width:200px;height:4px;
				border:0;background:rgba(120,140,220,.2);accent-color:#1230ff}
			#progress::-webkit-progress-bar{background:rgba(120,140,220,.2)}
			#progress::-webkit-progress-value{background:linear-gradient(90deg,#1230ff,#00c8ff)}
			#select-version a{color:#00c8ff;text-decoration:none}

			/* ---- touch controls (unchanged behaviour) ---- */
			.button{display:none;position:absolute;cursor:pointer;user-select:none;
				-webkit-user-select:none;-webkit-touch-callout:none;-webkit-user-drag:none;opacity:.2;z-index:15}
			body.touch .button{display:block}
			body.touch #nav{display:none}
			body.touch{user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;-webkit-user-drag:none}
			.button.active{opacity:.6}
			.button div{position:absolute;inset:0;margin:auto;color:#000;background-color:#fff;text-align:center}
			.button-round{width:12vw;height:12vw}
			.button-round div{width:7vw;height:7vw;border-radius:100%;font-size:3vw;font-weight:bold;line-height:7vw}
			.button-pill{width:12vw;height:6vw}
			.button-pill div{font-size:1.5vw;width:7vw;height:3.5vw;border-radius:3.5vw;line-height:3.5vw}
			.button-dpad{width:6vw;height:6vw}
			.button-dpad div{width:7;height:7}
			.button-dpad div:after{content:'';height:0;width:0;position:absolute}
			.button-dpad-up div{border-top-left-radius:.5vw;border-top-right-radius:.5vw}
			.button-dpad-up div:after{left:0;bottom:-2.85vw;border-left:3vw solid transparent;border-right:3vw solid transparent;border-top:2.9vw solid #fff}
			.button-dpad-down div{border-bottom-left-radius:.5vw;border-bottom-right-radius:.5vw}
			.button-dpad-down div:after{left:0;top:-2.85vw;border-left:3vw solid transparent;border-right:3vw solid transparent;border-bottom:2.9vw solid #fff}
			.button-dpad-left div{border-top-left-radius:.5vw;border-bottom-left-radius:.5vw}
			.button-dpad-left div:after{top:0;right:-2.85vw;border-top:3vw solid transparent;border-bottom:3vw solid transparent;border-left:2.9vw solid #fff}
			.button-dpad-right div{border-top-right-radius:.5vw;border-bottom-right-radius:.5vw}
			.button-dpad-right div:after{top:0;left:-2.85vw;border-top:3vw solid transparent;border-bottom:3vw solid transparent;border-right:2.9vw solid #fff}
		</style>
	</head>
	<body>
		<div id="nav">
			<a class="mark" href="/" title="Back to home">
				<svg viewBox="0 0 64 64" aria-hidden="true"><path d="M4 40 L40 8 L60 12 L30 56 Z" fill="#1230ff"/><path d="M4 40 L40 8 L44 24 Z" fill="#00c8ff"/></svg>
				EXIT
			</a>
			<button id="fullscreen" type="button">⛶ FULLSCREEN</button>
		</div>

		<div id="game" class="container">
			<canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex=-1></canvas>
			<div class="info-overlay" id="loading">
				<div id="spinner"></div>
				<div id="status">Loading</div>
				<progress value="0" max="100" id="progress" hidden=1></progress>
			</div>
			<div class="info-overlay" id="select-version">
				<p><a href="#" id="load-full-version">FULL VERSION</a><br/>the complete game ~144mb</p>
				<p><a href="#" id="load-minimal-version">MINIMAL VERSION</a><br/>no intro, no music ~11mb</p>
			</div>
			<!-- button enums from src/input.h -->
			<div class="button button-dpad button-dpad-up" style="left: 9vw; bottom: 22.5vw" data-button="82"><div></div></div>
			<div class="button button-dpad button-dpad-down" style="left: 9vw; bottom: 9.5vw" data-button="81"><div></div></div>
			<div class="button button-dpad button-dpad-left" style="left: 2vw; bottom: 16vw" data-button="80"><div></div></div>
			<div class="button button-dpad button-dpad-right" style="left: 16vw; bottom: 16vw" data-button="79"><div></div></div>

			<div class="button button-round" style="right: 2vw; bottom: 10vw" data-button="27"><div>X</div></div>
			<div class="button button-round" style="right: 14vw; bottom: 10vw" data-button="29"><div>Y</div></div>
			<div class="button button-pill" style="right: 2vw; bottom: 22vw" data-button="25"><div>br-r</div></div>
			<div class="button button-pill" style="right: 14vw; bottom: 22vw" data-button="6"><div>br-l</div></div>

			<div class="button button-pill" style="right: 2vw; top: 10vw" data-button="4"><div>view</div></div>
			<div class="button button-pill" style="left: 68vw; top: 1vw" data-button="40"><div>pause</div></div>
		</div>

		<script type='text/javascript'>
			var loadScript = (ev, src) => {
				ev.preventDefault();
				document.getElementById('select-version').style.display = 'none';
				document.getElementById('loading').style.display = 'block';
				var s = document.createElement('script');
				s.setAttribute('src', src + '?v=ag7');
				document.head.appendChild(s);
				var audioCtx = new AudioContext();
				audioCtx.resume();
				return false;
			};

			var requestFullscreen = (ev) => {
				ev.preventDefault();
				document.getElementById('game').requestFullscreen();
			};

			document.getElementById('select-version').style.display = 'none';
			loadScript({preventDefault(){}}, 'antigravity.js'); /* auto-boot full version */
			document.getElementById('fullscreen').addEventListener('click', (ev) => requestFullscreen(ev));
			document.getElementById('load-full-version').addEventListener('click', (ev) => loadScript(ev, 'antigravity.js'));
			document.getElementById('load-minimal-version').addEventListener('click', (ev) => loadScript(ev, 'antigravity.js'));

			var statusElement = document.getElementById('status');
			var progressElement = document.getElementById('progress');
			var spinnerElement = document.getElementById('spinner');

			let onGameLoad = function() {
				document.getElementById('loading').style.display = 'none';
				window.scrollTo(0, 0);

				let nav = document.getElementById('nav');
				// fade the EXIT/fullscreen nav out shortly after the race starts
				let hideTimer = setTimeout(() => nav.classList.add('hide'), 3500);
				let poke = () => { nav.classList.remove('hide'); clearTimeout(hideTimer); hideTimer = setTimeout(() => nav.classList.add('hide'), 3500); };
				window.addEventListener('mousemove', poke, {passive:true});

				let isTouchDevice = (window.matchMedia && window.matchMedia('(pointer: coarse)').matches)
					|| navigator.maxTouchPoints > 0 || ('ontouchstart' in window);
				if (isTouchDevice) {
					nav.style.display = 'none';
					document.body.classList.add('touch');
					let touchButtons = document.getElementsByClassName('button');
					for (let i = 0; i < touchButtons.length; i++) {
						let button = touchButtons[i];
						button.addEventListener('pointerdown', (ev) => { ev.preventDefault(); ev.currentTarget.setPointerCapture(ev.pointerId);
							Module._set_button(parseInt(ev.currentTarget.dataset.button), 1);
							ev.currentTarget.classList.add('active');
						});
						button.addEventListener('pointerup', (ev) => { ev.preventDefault();
							Module._set_button(parseInt(ev.currentTarget.dataset.button), 0);
							ev.currentTarget.classList.remove('active');
						});
					}
				}
			};

			var Module = {
				locateFile: (path, prefix) => prefix + path + '?v=ag7',
				preRun: [],
				postRun: [],
				print: function(text) {
					if (arguments.length > 1) text = Array.prototype.slice.call(arguments).join(' ');
					console.log(text);
				},
				canvas: document.getElementById('canvas'),
				setStatus: (text) => {
					if (!Module.setStatus.last) { Module.setStatus.last = { time: Date.now(), text: '' }; }
					if (text === Module.setStatus.last.text) { return; }
					var m = text.match(/([^(]+)\((\d+(\.\d+)?)\/(\d+)\)/);
					var now = Date.now();
					if (m && now - Module.setStatus.last.time < 30) { return; }
					Module.setStatus.last.time = now;
					Module.setStatus.last.text = text;
					if (m) {
						text = 'Loading';
						progressElement.value = parseInt(m[2])*100;
						progressElement.max = parseInt(m[4])*100;
						progressElement.hidden = false;
						spinnerElement.hidden = false;
					} else {
						progressElement.value = null;
						progressElement.max = null;
						progressElement.hidden = true;
						if (!text) { spinnerElement.hidden = true; onGameLoad(); }
					}
					statusElement.innerHTML = text;
				},
				totalDependencies: 0,
				monitorRunDependencies: (left) => {
					Module.totalDependencies = Math.max(Module.totalDependencies, left);
					Module.setStatus(left ? 'Loading (' + (Module.totalDependencies-left) + '/' + Module.totalDependencies + ')' : 'Loading');
				}
			};
			Module.setStatus('Loading');
			window.onerror = () => {
				Module.setStatus('Exception thrown, see JavaScript console');
				document.getElementById('loading').style.display = 'block';
				spinnerElement.style.display = 'none';
				Module.setStatus = (text) => { if (text) { console.error('[post-exception status] ' + text); } };
			};
		</script>
	</body>
</html>
